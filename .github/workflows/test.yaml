name: tests

on:
  push:
    branches:
      - master
  pull_request: null

env:
  PY_COLORS: "1"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lsst-tests:
    name: lsst-tests
    runs-on: "ubuntu-latest"
    strategy:
      fail-fast: false

    steps:
      - name: free disk space for stackvana
        uses: endersonmenezes/free-disk-space@v3
        with:
          remove_android: true
          remove_dotnet: true
          remove_haskell: true
          rm_cmd: "rmz"  # Faster cleanup

      - uses: actions/checkout@v6

      - uses: mamba-org/setup-micromamba@v3.0.0
        with:
          environment-name: test
          condarc: |
            channels:
              - conda-forge
            channel_priority: strict
            show_channel_urls: true
            always_yes: true
          create-args: >-
            stackvana=0
            lsstdesc-weaklensingdeblending
            pip

      - name: configure conda and install code
        shell: bash -l {0}
        run: |

          micromamba install -q \
            flake8 \
            pytest \
            numpy \
            "galsim>=2.3" \
            "numba!=0.54.0" \
            ngmix \
            meds \
            fitsio

          pip install --no-deps --no-build-isolation git+https://github.com/LSSTDESC/descwl-shear-sims.git
          pip install --no-deps --no-build-isolation git+https://github.com/LSSTDESC/descwl_coadd.git
          pip install --no-deps --no-build-isolation git+https://github.com/esheldon/metadetect.git

          pip install --no-deps --no-build-isolation  -e .

      - name: Lint with flake8
        shell: bash -l {0}
        run: flake8

      - name: Run pytest
        shell: bash -l {0}
        run: |
          unsetup -j metadetect
          pytest -vv

